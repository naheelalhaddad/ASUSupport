<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASU Support - Materials Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --asu-red: #9D0208;
            --bg-dark: #0a0c10;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
        }

        body { 
            margin: 0; min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1a0505, #0a0c10);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px;
        }

        h1 { margin-bottom: 30px; text-shadow: 0 0 20px rgba(157, 2, 8, 0.4); }

        .container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 10px; }

        /* Level 1: Major */
        .major-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; overflow: hidden; }
        .major-btn { width: 100%; padding: 20px; background: rgba(255,255,255,0.02); border: none; color: white; display: flex; justify-content: space-between; cursor: pointer; font-size: 1.2rem; font-weight: bold; }

        /* Level 2: Course */
        .course-list { display: none; padding: 10px; flex-direction: column; gap: 8px; }
        .course-item { background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid var(--glass-border); overflow: hidden; }
        .course-btn { width: 100%; padding: 15px; background: none; border: none; color: #fff; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; }

        /* Level 3: Category */
        .category-list { display: none; padding: 10px 20px; background: rgba(0,0,0,0.3); flex-direction: column; gap: 5px; }
        .category-btn { width: 100%; padding: 10px; background: none; border: none; color: var(--asu-red); display: flex; justify-content: space-between; cursor: pointer; font-size: 0.9rem; font-weight: 800; border-bottom: 1px solid var(--glass-border); margin-bottom: 5px; }

       /* Files */
        .file-list { display: none; flex-direction: column; gap: 8px; padding: 10px 0; }
        .file-row { padding: 12px 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; font-size: 0.95rem; color: #ddd; }
        .file-row:hover { background: var(--asu-red); color: white; border-color: var(--asu-red); transform: translateX(-5px); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; }
        .modal-header { height: 60px; background: var(--asu-red); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; background: white; }
        
        .show { display: flex !important; flex-direction: column; }
        .rotate { transform: rotate(180deg); }
        .arrow { transition: 0.3s; }
    </style>
</head>
<body>

    <h1>بنك المواد الأكاديمية</h1>

    <div id="main-container" class="container"></div>

    <div id="pdfModal" class="modal">
        <div class="modal-header">
            <span id="pdfTitle">File Viewer</span>
            <button onclick="closePdf()" style="background: white; color: var(--asu-red); border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">إغلاق</button>
        </div>
        <iframe id="pdfFrame"></iframe>
    </div>

    
   <script>
        const AZURE_BASE = "https://asusupportfiles.blob.core.windows.net/pastpapers/";

        const linearAlgebra = {
            name: "Linear Algebra",
            arabic: "الجبر الخطي",
            content: {
                slides: [
                    { label: "1. Getting Started", file: "1_ Getting Started.pdf" },
                    { label: "2. Characterizing Running Times", file: "2_ Characterizing Running Times.pdf" },
                    { label: "3. Recursion", file: "3_ Recursion.pdf" },
                    { label: "4. Insertion Sort", file: "4_ Insertion sort.pdf" },
                    { label: "5. Bubble Sort", file: "5_ Bubble sort.pdf" },
                    { label: "6. Merge Sort", file: "6_ Merge Sort.pdf" },
                    { label: "7. Quick Sort", file: "7_ Quick_Sort.pdf" },
                    { label: "8. Heap Sort", file: "8_Heap_Sort.pdf" },
                    { label: "9. Lower Bound Linear Sort", file: "9_ Lower_Bound_Linear_Sort.pdf" },
                    { label: "10. Elementary Graph Algorithms (BFS)", file: "10_Elementary Graph Algorithms_BFS.pdf" },
                    { label: "11. Graph Algorithms (DFS)", file: "11_Graph Algorithms_DFS.pdf" }
                ],
                exams: [],
                quizzes: []
            }
        };

        const calculus1 = {
            name: "Calculus (1)",
            arabic: "تفاضل وتكامل (1)",
            content: {
                slides: [
                    { label: "Final Notes Slides", file: "Calc slides final notes.pdf" },
                    { label: "Abdulrahman Notes", file: "Calc (Abdulrahman).pdf" }
                ],
                exams: [
                    { label: "Midterm 20251 (A)", file: "Calc - Mid (A) - 20251.pdf" },
                    { label: "Midterm 20251 (B)", file: "Calc - Mid (B) - 20251.pdf" },
                    { label: "Midterm 20241", file: "Calc - Mid - 20241.pdf" },
                    { label: "Midterm 20231 (A)", file: "Calc - Mid (A) - 20231.pdf" },
                    { label: "Midterm 20231 (B)", file: "Calc - Mid (B) - 20231.pdf" }
                ],
                quizzes: [
                    { label: "Quiz 1 (20251)", file: "Calc - Quiz1 - 20251.pdf" },
                    { label: "Quiz 2 (20251)", file: "Calc - Quiz2 - 20251.pdf" },
                    { label: "Quiz 1 (20231)", file: "Calc - Quiz1 - 20231.pdf" },
                    { label: "Quiz 2 (20231)", file: "Calc - Quiz2 - 20231.pdf" },
                    { label: "Quiz 3 (20231)", file: "Calc - Quiz3 - 20231.pdf" }
                ]
            }
        };

        const computingSystems = {
            name: "Computing Systems for DSAI",
            arabic: "أنظمة الحوسبة",
            content: {
                slides: [],
                exams: [
                    { label: "Final 20251", file: "Computing Systems - Final- 20251.pdf" },
                    { label: "Midterm 20251", file: "Computing Systems - Mid - 20251.pdf" }
                ],
                quizzes: [
                    { label: "Quiz 1 20251", file: "Computing Systems - Quiz1 - 20251.pdf" },
                    { label: "Quiz 2 20251", file: "Computing Systems - Quiz2 - 20251.pdf" }
                ]
            }
        };

        const dataEngineering = {
            name: "Data Engineering and Analysis",
            arabic: "هندسة وتحليل البيانات",
            content: {
                slides: [],
                exams: [
                    { label: "Midterm 20242", file: "Data engineer - Mid - 20242.pdf" },
                    { label: "Midterm 20241", file: "Data engineer - Mid - 20241.pdf" },
                    { label: "Midterm 20232", file: "Data engineer - Mid - 20232.pdf" }
                ],
                quizzes: []
            }
        };

        const dataMining = {
            name: "Data Mining",
            arabic: "التنقيب في البيانات",
            content: {
                slides: [],
                exams: [
                    { label: "Midterm 20251", file: "Data mining - Mid - 20251.pdf" }
                ],
                quizzes: [
                    { label: "Quiz 1 20251", file: "Data mining - Quiz1 - 20251.pdf" },
                    { label: "Quiz 2 20251", file: "Data mining - Quiz2 - 20251.pdf" }
                ]
            }
        };

        const materials = [
            { major: "الذكاء الاصطناعي وعلم البيانات (AI & DS)", courses: [linearAlgebra, calculus1, computingSystems, dataEngineering, dataMining] },
            { major: "علم الحاسوب (CS)", courses: [linearAlgebra, calculus1] },
            { major: "الأمن السيبراني (Cybersecurity)", courses: [linearAlgebra, calculus1] },
            { major: "هندسة البرمجيات (SE)", courses: [linearAlgebra, calculus1] },
            { major: "الواقع الرقمي والألعاب (Gaming)", courses: [linearAlgebra, calculus1] }
        ];

        function init() {
            const container = document.getElementById('main-container');
            materials.forEach((m, mIdx) => {
                let html = `
                    <div class="major-item">
                        <button class="major-btn" onclick="toggle(this)">
                            <span>${m.major}</span> <span class="arrow">▼</span>
                        </button>
                        <div class="course-list">
                            ${m.courses.map((c, cIdx) => `
                                <div class="course-item">
                                    <button class="course-btn" onclick="toggle(this)">
                                        <span>${c.name} - ${c.arabic}</span> <span class="arrow">▼</span>
                                    </button>
                                    <div class="category-list">
                                        ${renderSection("Slides / الشرح", c.content.slides)}
                                        ${renderSection("Exams / الامتحانات", c.content.exams)}
                                        ${renderSection("Quizzes / الكويزات", c.content.quizzes)}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                container.innerHTML += html;
            });
        }

        function renderSection(title, files) {
            if (!files || files.length === 0) return "";
            return `
                <div class="category-group">
                    <button class="category-btn" onclick="toggle(this)">
                        <span>${title}</span> <span class="arrow">▼</span>
                    </button>
                    <div class="file-list">
                        ${files.map(f => `
                            <div class="file-row" onclick="openPdf('${f.file}', '${f.label}')">
                                <span>${f.label}</span> <span>📄</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        function toggle(btn) {
            const panel = btn.nextElementSibling;
            const arrow = btn.querySelector('.arrow');
            panel.classList.toggle('show');
            if(arrow) arrow.classList.toggle('rotate');
        }

        function openPdf(file, title) {
            document.getElementById('pdfTitle').innerText = title;
            document.getElementById('pdfFrame').src = AZURE_BASE + encodeURIComponent(file);
            document.getElementById('pdfModal').style.display = 'block';
        }

        function closePdf() {
            document.getElementById('pdfModal').style.display = 'none';
            document.getElementById('pdfFrame').src = '';
        }

        init();
    </script>

    
</body>
</html>
