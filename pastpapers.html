<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASU Support - Materials Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --asu-red: #9D0208;
            --bg-dark: #0a0c10;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            margin: 0; 
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1a0505, #0a0c10);
            color: var(--text-main);
            display: flex;
            overflow: hidden; /* Prevent body scroll, let content area scroll */
        }

        /* Dashboard Layout */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-left: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sidebar Elements */
        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-area h2 { margin: 0; color: white; text-shadow: 0 0 10px rgba(157,2,8,0.5); font-size: 1.8rem; }
        
        .major-btn {
            width: 100%; padding: 15px 20px; background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--text-muted); border-radius: 12px; cursor: pointer; text-align: right;
            font-size: 1.1rem; font-weight: bold; transition: 0.3s;
        }
        .major-btn:hover { background: rgba(255,255,255,0.08); color: white; }
        .major-btn.active { background: var(--asu-red); color: white; border-color: var(--asu-red); box-shadow: 0 0 15px rgba(157,2,8,0.4); }

        /* Content Elements */
        .header-section { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 2.2rem; }
        
        .search-box {
            width: 350px; padding: 15px 25px; border-radius: 50px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5);
            color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-box:focus { border-color: var(--asu-red); }

        .courses-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 15px; }

        /* Course Accordion */
        .course-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; overflow: hidden; backdrop-filter: blur(10px); }
        .course-header { padding: 20px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
        .course-header h3 { margin: 0; font-size: 1.2rem; color: white; }
        .course-header span { color: var(--text-muted); font-size: 0.9rem; }
        
        .course-body { display: none; padding: 0 25px 25px 25px; }
        .course-body.show { display: block; }

        /* Flat File Lists inside Course */
        .section-title { color: #fca5a5; font-size: 0.9rem; font-weight: bold; margin: 20px 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .file-item { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); padding: 12px 15px; 
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; transition: 0.2s; font-size: 0.9rem; color: #ccc;
        }
        .file-item:hover { background: var(--asu-red); color: white; border-color: var(--asu-red); transform: translateY(-3px); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; }
        .modal-header { height: 60px; background: var(--asu-red); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; background: white; }
        .close-btn { background: white; color: var(--asu-red); border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .arrow { transition: transform 0.3s; }
        .rotate { transform: rotate(180deg); }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; border-left: none; border-bottom: 1px solid var(--glass-border); padding: 20px; box-sizing: border-box; }
            .main-content { padding: 20px; overflow-y: visible; }
            .header-section { flex-direction: column; gap: 15px; align-items: stretch; }
            .search-box { width: 100%; box-sizing: border-box; }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <h2>بنك المواد</h2>
        </div>
        <div id="major-nav">
            </div>
    </aside>

    <main class="main-content">
        <div class="header-section">
            <h1 id="current-major-title">الرجاء اختيار التخصص</h1>
            <input type="text" id="search" class="search-box" placeholder="ابحث في هذا التخصص...">
        </div>
        
        <div id="courses-container" class="courses-container">
            </div>
    </main>

    <div id="pdfModal" class="modal">
        <div class="modal-header">
            <span id="pdfTitle" style="font-weight: bold;">File Viewer</span>
            <button class="close-btn" onclick="closePdf()">إغلاق</button>
        </div>
        <iframe id="pdfFrame"></iframe>
    </div>

    <script>
        const AZURE_BASE = "https://asusupportfiles.blob.core.windows.net/pastpapers/";

        // DATA BLOCKS
        const linearAlgebra = {
            name: "Linear Algebra", arabic: "الجبر الخطي",
            content: {
                slides: [
                    { label: "1. Getting Started", file: "1_ Getting Started.pdf" },
                    { label: "2. Characterizing Running Times", file: "2_ Characterizing Running Times.pdf" },
                    { label: "3. Recursion", file: "3_ Recursion.pdf" },
                    { label: "4. Insertion Sort", file: "4_ Insertion sort.pdf" },
                    { label: "5. Bubble Sort", file: "5_ Bubble sort.pdf" },
                    { label: "6. Merge Sort", file: "6_ Merge Sort.pdf" },
                    { label: "7. Quick Sort", file: "7_ Quick_Sort.pdf" },
                    { label: "8. Heap Sort", file: "8_Heap_Sort.pdf" },
                    { label: "9. Lower Bound Linear Sort", file: "9_ Lower_Bound_Linear_Sort.pdf" },
                    { label: "10. Elementary Graph Algorithms (BFS)", file: "10_Elementary Graph Algorithms_BFS.pdf" },
                    { label: "11. Graph Algorithms (DFS)", file: "11_Graph Algorithms_DFS.pdf" }
                ], exams: [], quizzes: []
            }
        };

        const calculus1 = {
            name: "Calculus (1)", arabic: "تفاضل وتكامل (1)",
            content: {
                slides: [
                    { label: "Final Notes Slides", file: "Calc slides final notes.pdf" },
                    { label: "Abdulrahman Notes", file: "Calc (Abdulrahman).pdf" }
                ],
                exams: [
                    { label: "Midterm 20251 (A)", file: "Calc - Mid (A) - 20251.pdf" },
                    { label: "Midterm 20251 (B)", file: "Calc - Mid (B) - 20251.pdf" },
                    { label: "Midterm 20241", file: "Calc - Mid - 20241.pdf" },
                    { label: "Midterm 20231 (A)", file: "Calc - Mid (A) - 20231.pdf" },
                    { label: "Midterm 20231 (B)", file: "Calc - Mid (B) - 20231.pdf" }
                ],
                quizzes: [
                    { label: "Quiz 1 (20251)", file: "Calc - Quiz1 - 20251.pdf" },
                    { label: "Quiz 2 (20251)", file: "Calc - Quiz2 - 20251.pdf" },
                    { label: "Quiz 1 (20231)", file: "Calc - Quiz1 - 20231.pdf" },
                    { label: "Quiz 2 (20231)", file: "Calc - Quiz2 - 20231.pdf" },
                    { label: "Quiz 3 (20231)", file: "Calc - Quiz3 - 20231.pdf" }
                ]
            }
        };

        const computingSystems = {
            name: "Computing Systems for DSAI", arabic: "أنظمة الحوسبة",
            content: {
                slides: [],
                exams: [
                    { label: "Final 20251", file: "Computing Systems - Final- 20251.pdf" },
                    { label: "Midterm 20251", file: "Computing Systems - Mid - 20251.pdf" }
                ],
                quizzes: [
                    { label: "Quiz 1 20251", file: "Computing Systems - Quiz1 - 20251.pdf" },
                    { label: "Quiz 2 20251", file: "Computing Systems - Quiz2 - 20251.pdf" }
                ]
            }
        };

        const dataEngineering = {
            name: "Data Engineering and Analysis", arabic: "هندسة وتحليل البيانات",
            content: {
                slides: [],
                exams: [
                    { label: "Midterm 20242", file: "Data engineer - Mid - 20242.pdf" },
                    { label: "Midterm 20241", file: "Data engineer - Mid - 20241.pdf" },
                    { label: "Midterm 20232", file: "Data engineer - Mid - 20232.pdf" }
                ],
                quizzes: []
            }
        };

        const dataMining = {
            name: "Data Mining", arabic: "التنقيب في البيانات",
            content: {
                slides: [],
                exams: [ { label: "Midterm 20251", file: "Data mining - Mid - 20251.pdf" } ],
                quizzes: [
                    { label: "Quiz 1 20251", file: "Data mining - Quiz1 - 20251.pdf" },
                    { label: "Quiz 2 20251", file: "Data mining - Quiz2 - 20251.pdf" }
                ]
            }
        };

        const materials = [
            { major: "الذكاء الاصطناعي (AI & DS)", courses: [linearAlgebra, calculus1, computingSystems, dataEngineering, dataMining] },
            { major: "علم الحاسوب (CS)", courses: [linearAlgebra, calculus1] },
            { major: "الأمن السيبراني (Cybersecurity)", courses: [linearAlgebra, calculus1] },
            { major: "هندسة البرمجيات (SE)", courses: [linearAlgebra, calculus1] },
            { major: "الواقع الرقمي والألعاب (Gaming)", courses: [linearAlgebra, calculus1] }
        ];

        let currentMajorIndex = 0; // Default to AI

        function init() {
            renderSidebar();
            selectMajor(0); // Load first major on startup
        }

        function renderSidebar() {
            const nav = document.getElementById('major-nav');
            nav.innerHTML = materials.map((m, idx) => `
                <button class="major-btn" id="btn-${idx}" onclick="selectMajor(${idx})">
                    ${m.major}
                </button>
            `).join('');
        }

        function selectMajor(index) {
            // Update UI State
            document.querySelectorAll('.major-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${index}`).classList.add('active');
            
            document.getElementById('current-major-title').innerText = materials[index].major;
            document.getElementById('search').value = ""; // Clear search
            
            currentMajorIndex = index;
            renderCourses(materials[index].courses);
        }

        function renderCourses(coursesArray) {
            const container = document.getElementById('courses-container');
            container.innerHTML = coursesArray.map((c, cIdx) => `
                <div class="course-card" data-name="${c.name.toLowerCase()} ${c.arabic}">
                    <div class="course-header" onclick="toggleCourse(this)">
                        <div>
                            <h3>${c.name}</h3>
                            <span>${c.arabic}</span>
                        </div>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="course-body">
                        ${renderFlatSection("Slides / الشرح", c.content.slides)}
                        ${renderFlatSection("Exams / الامتحانات", c.content.exams)}
                        ${renderFlatSection("Quizzes / الكويزات", c.content.quizzes)}
                    </div>
                </div>
            `).join('');
        }

        function renderFlatSection(title, files) {
            if (!files || files.length === 0) return "";
            return `
                <div class="section-title">${title}</div>
                <div class="file-grid">
                    ${files.map(f => `
                        <div class="file-item" onclick="openPdf('${f.file}', '${f.label}')">
                            <span>${f.label}</span> <span>📄</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function toggleCourse(headerElement) {
            const body = headerElement.nextElementSibling;
            const arrow = headerElement.querySelector('.arrow');
            body.classList.toggle('show');
            arrow.classList.toggle('rotate');
        }

        function openPdf(file, title) {
            document.getElementById('pdfTitle').innerText = title;
            document.getElementById('pdfFrame').src = AZURE_BASE + encodeURIComponent(file);
            document.getElementById('pdfModal').style.display = 'block';
        }

        function closePdf() {
            document.getElementById('pdfModal').style.display = 'none';
            document.getElementById('pdfFrame').src = '';
        }

        // Search logic applied only to current major's courses
        document.getElementById('search').oninput = function() {
            const val = this.value.toLowerCase();
            document.querySelectorAll('.course-card').forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(val) ? 'block' : 'none';
            });
        };

        init();
    </script>
</body>
</html>
