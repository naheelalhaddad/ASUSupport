<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FNTBG5RY0T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FNTBG5RY0T');
    </script>
    
    <title>ASU Learn - Video Courses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            background-color: #0f0f0f;
            display: flex;
            flex-direction: column;
        }

        /* --- 1. BIGGER NAVBAR --- */
        .navbar {
            height: 80px; /* Bigger */
            background: linear-gradient(to bottom, #1a0000, #000); /* Dark Red tint */
            border-bottom: 2px solid #9D0208;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(157, 2, 8, 0.4);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .home-btn { 
            text-decoration: none; 
            color: #fff; 
            font-size: 1.1rem; 
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .home-btn:hover { background: #9D0208; }

        .course-select {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 15px; /* Bigger padding */
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        /* --- 2. HERO SECTION (The Big Sign) --- */
        .hero-banner {
            background: linear-gradient(135deg, #9D0208 0%, #3a0000 100%);
            padding: 50px 20px;
            text-align: center;
            border-bottom: 1px solid #ff4d4d;
            box-shadow: 0 0 30px rgba(157, 2, 8, 0.3);
            margin-bottom: 40px;
        }
        
        .hero-title {
            color: white;
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .hero-subtitle {
            color: #ffcccc;
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: 500;
        }

        /* --- 3. COURSE GRID (Clean, No Icons) --- */
        #courseSelectionView {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
            box-sizing: border-box;
            display: block;
        }

        .video-course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .video-course-card {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #444;
            border-right: 4px solid #9D0208; /* Red Accent on side */
            border-radius: 12px;
            padding: 30px 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .video-course-card:hover {
            background: #2a2a2a;
            transform: translateY(-5px);
            border-color: #ff4d4d;
            box-shadow: 0 10px 25px rgba(157, 2, 8, 0.2);
        }

        .v-card-title { font-weight: bold; font-size: 1.3rem; color: white; margin-bottom: 8px; }
        .v-card-desc { color: #aaa; font-size: 0.95rem; }

        /* --- 4. PLAYER VIEW --- */
        #playerView {
            display: none;
            flex: 1;
            height: calc(100vh - 80px); /* Adjust for new navbar height */
            overflow: hidden;
            flex-direction: row-reverse; 
        }

        .sidebar {
            width: 320px;
            background: #111;
            border-right: 1px solid #333; 
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .course-progress { padding: 25px; border-bottom: 1px solid #333; text-align: right; background: #1a0000; }
        .progress-bar-bg { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 10px; }
        .progress-bar-fill { height: 100%; background: #ff4d4d; border-radius: 4px; width: 0%; transition: width 0.5s; }

        .module-list { flex: 1; overflow-y: auto; }
        .module-header { background: #222; padding: 15px 20px; font-weight: bold; color: #fff; border-bottom: 1px solid #444; text-align: right; border-right: 3px solid #9D0208; }
        
        .video-item {
            display: flex; padding: 18px 20px; cursor: pointer;
            border-bottom: 1px solid #222; transition: 0.2s;
            align-items: center; justify-content: space-between; flex-direction: row-reverse;
        }
        .video-item:hover { background: #222; }
        .video-item.active { background: rgba(157, 2, 8, 0.15); border-right: 4px solid #ff4d4d; }
        .video-item.completed .item-icon { color: #2ecc71; }
        .video-item.completed .item-title { color: #777; text-decoration: line-through; }

        .item-title { font-size: 0.95rem; color: #ddd; text-align: right; flex: 1; margin-right: 15px; }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-wrapper {
            width: 100%; max-width: 1100px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 12px; overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin-bottom: 25px;
        }
        iframe, video { width: 100%; height: 100%; border: none; }

        .video-info { width: 100%; max-width: 1100px; text-align: right; }
        .video-title { font-size: 1.8rem; color: #fff; margin-bottom: 10px; border-bottom: 2px solid #9D0208; padding-bottom: 10px; display: inline-block;}
        .video-desc { color: #bbb; line-height: 1.7; font-size: 1.05rem; }

        .controls {
            width: 100%; max-width: 1100px; display: flex; justify-content: space-between;
            margin-top: 30px; padding-top: 20px; border-top: 1px solid #333;
        }
        .btn-control {
            padding: 12px 25px; border-radius: 8px; border: 1px solid #555;
            background: #222; color: white; cursor: pointer; font-size: 1rem; transition: 0.3s; font-weight: bold;
        }
        .btn-control:hover { background: #333; border-color: #fff; }
        .btn-primary { background: #9D0208; border-color: #9D0208; }
        .btn-primary:hover { background: #cc020a; border-color: #cc020a; }

        @media (max-width: 768px) {
            #playerView { flex-direction: column; }
            .sidebar { width: 100%; height: 40%; order: 2; }
            .content-area { height: 60%; order: 1; }
            .hero-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-right">
            <a href="index.html" class="home-btn">🏠 الرئيسية (Home)</a>
            
            <button id="backToCoursesBtn" class="home-btn" style="display: none; background: #9D0208;" onclick="exitPlayer()">
                📚 قائمة المواد (Courses)
            </button>

            <select id="courseDropdown" class="course-select" onchange="switchCourse(this.value)">
                <option value="" disabled selected>تغيير المساق (Change Course)</option>
            </select>
        </div>
        
        <div style="color: white; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px;">ASU LEARN</div>
    </div>

    <div id="courseSelectionView">
        
        <div class="hero-banner">
            <h1 class="hero-title">Course Videos</h1>
            <div class="hero-subtitle">Viewing videos for each course in proper order</div>
        </div>

        <div class="video-course-grid" id="courseGrid"></div>
    </div>

    <div id="playerView">
        <div class="sidebar">
            <div class="course-progress">
                <div style="display:flex; justify-content:space-between; color: white; font-weight: bold;">
                    <span id="progressText">0%</span>
                    <span>التقدم (Progress)</span>
                </div>
                <div class="progress-bar-bg"><div id="progressBar" class="progress-bar-fill"></div></div>
            </div>
            <div class="module-list" id="moduleList"></div>
        </div>

        <div class="content-area">
            <div class="video-wrapper">
                <iframe id="ytPlayer" src="" allowfullscreen style="display:none;"></iframe>
                <video id="localPlayer" controls style="display:none;"><source id="localSource" src="" type="video/mp4"></video>
            </div>
            <div class="video-info">
                <h2 id="currentVideoTitle" class="video-title">...</h2>
                <p id="currentVideoDesc" class="video-desc">...</p>
            </div>
            <div class="controls">
                <button class="btn-control" id="prevBtn" onclick="prevVideo()">السابق (Prev)</button>
                <button class="btn-control btn-primary" id="nextBtn" onclick="markAndNext()">إكمال (Next)</button>
            </div>
        </div>
    </div>

    <script>
        const coursesData = {
            "oop1": {
                title: "Object-Oriented Programming (1)",
                desc: "البرمجة الكينونية (1)",
                modules: [
                    {
                        title: "Course Material",
                        videos: [
                            { 
                                id: "oop1_mid_rev", 
                                title: "Midterm Revision (مراجعة)", 
                                type: "youtube", 
                                src: "https://www.youtube.com/embed/U004Ow6Lji0", 
                                desc: "Full midterm revision covering key concepts and problem solving." 
                            },
                            { 
                                id: "oop1_comp_agg", 
                                title: "Composition & Aggregation", 
                                type: "youtube", 
                                src: "https://www.youtube.com/embed/s-wXZ_qO1_c", 
                                desc: "Detailed explanation of Composition and Aggregation relationships in Java." 
                            }
                        ]
                    }
                ]
            },
            "cpp": { title: "Structured Programming (C++)", desc: "البرمجة المهيكلة", modules: [] },
            "dsa": { title: "Data Structures & Algorithms", desc: "تراكيب البيانات والخوارزميات", modules: [] },
            "db": { title: "Database & Applications", desc: "قواعد البيانات وتطبيقاتها", modules: [] },
            "linear": { title: "Linear Algebra", desc: "الجبر الخطي", modules: [] },
            "calc1": { title: "Calculus (1)", desc: "تفاضل وتكامل (1)", modules: [] },
            "discrete": { title: "Discrete Structures (1)", desc: "تراكيب منفصلة (1)", modules: [] },
            "prob": { title: "Probability & Statistics", desc: "الاحتمالات والإحصاء", modules: [] },
            "num": { title: "Numerical Analysis", desc: "التحليل العددي", modules: [] },
            "techwrite": { title: "Technical Writing", desc: "مهارات الكتابة الفنية", modules: [] },
            "ethics": { title: "Computing Ethics", desc: "أخلاقيات الحاسوب", modules: [] },
            "web": { title: "Web-Based Programming", desc: "برمجة تطبيقات الويب", modules: [] },
            "digital": { title: "Digital Systems", desc: "النظم الرقمية", modules: [] },
            "arch": { title: "Comp. Org. & Architecture", desc: "تنظيم وعمارة الحاسوب", modules: [] },
            "assembly": { title: "Assembly Language", desc: "لغة التجميع", modules: [] },
            "cyber_intro": { title: "Intro to Cybersecurity", desc: "مقدمة في الأمن السيبراني", modules: [] },
            "cyber_prog": { title: "Cybersecurity Programming", desc: "البرمجة للأمن السيبراني", modules: [] },
            "os_cyber": { title: "OS for Cyber", desc: "نظم التشغيل للأمن", modules: [] },
            "net_sec": { title: "Network Security", desc: "أمن الشبكات", modules: [] },
            "eth_hack": { title: "Ethical Hacking", desc: "القرصنة الأخلاقية", modules: [] },
            "forensics": { title: "Digital Forensics", desc: "التحقيق الرقمي", modules: [] },
            "ai_prog": { title: "AI Programming", desc: "برمجة الذكاء الاصطناعي", modules: [] },
            "ml": { title: "Machine Learning", desc: "تعلم الآلة", modules: [] },
            "dl": { title: "Deep Learning", desc: "التعلم العميق", modules: [] },
            "nlp": { title: "NLP", desc: "معالجة اللغات", modules: [] },
            "game_ai": { title: "AI for Gaming", desc: "الذكاء الاصطناعي للألعاب", modules: [] },
            "unity": { title: "Game Development", desc: "تطوير الألعاب", modules: [] }
        };

        let currentCourseId = null;
        let flatList = [];
        let currentIndex = 0;
        let userProgress = {};

        function init() {
            const dropdown = document.getElementById('courseDropdown');
            for (const [key, data] of Object.entries(coursesData)) {
                const option = document.createElement('option');
                option.value = key;
                option.innerText = data.title;
                dropdown.appendChild(option);
            }

            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');

            if(courseId && coursesData[courseId]) {
                openPlayer(courseId);
                dropdown.value = courseId;
            } else {
                renderCourseGrid();
            }
        }

        function switchCourse(id) {
            window.history.pushState({}, "", `?id=${id}`);
            openPlayer(id);
        }

        function renderCourseGrid() {
            document.getElementById('courseSelectionView').style.display = 'block';
            document.getElementById('playerView').style.display = 'none';
            document.getElementById('courseDropdown').style.display = 'none';
            document.getElementById('backToCoursesBtn').style.display = 'none'; // Hide Back button

            const grid = document.getElementById('courseGrid');
            grid.innerHTML = "";

            for (const [key, data] of Object.entries(coursesData)) {
                const card = document.createElement('div');
                card.className = 'video-course-card';
                card.onclick = () => {
                    window.history.pushState({}, "", `?id=${key}`);
                    openPlayer(key);
                };
                
                // NO ICONS - Text Only
                card.innerHTML = `
                    <div class="v-card-title">${data.title}</div>
                    <div class="v-card-desc">${data.desc}</div>
                `;
                grid.appendChild(card);
            }
        }

        function openPlayer(id) {
            currentCourseId = id;
            const course = coursesData[id];
            
            if (!course.modules || course.modules.length === 0) {
                alert("Coming Soon! No videos uploaded for this course yet.");
                window.history.pushState({}, "", window.location.pathname);
                renderCourseGrid();
                return;
            }

            document.getElementById('courseSelectionView').style.display = 'none';
            document.getElementById('playerView').style.display = 'flex';
            document.getElementById('courseDropdown').style.display = 'block';
            document.getElementById('courseDropdown').value = id;
            document.getElementById('backToCoursesBtn').style.display = 'flex'; // Show Back button

            userProgress = JSON.parse(localStorage.getItem('asu_vid_progress_' + id)) || {};

            const listContainer = document.getElementById('moduleList');
            listContainer.innerHTML = "";
            flatList = [];

            course.modules.forEach(mod => {
                const header = document.createElement('div');
                header.className = 'module-header';
                header.innerText = mod.title;
                listContainer.appendChild(header);

                mod.videos.forEach(vid => {
                    flatList.push(vid);
                    const idx = flatList.length - 1;
                    
                    const item = document.createElement('div');
                    item.className = 'video-item';
                    item.id = `item-${idx}`;
                    if(userProgress[vid.id]) item.classList.add('completed');
                    item.onclick = () => loadVideo(idx);

                    item.innerHTML = `
                        <div class="item-title">${vid.title}</div>
                        <div class="item-icon">${userProgress[vid.id] ? '✓' : '▶'}</div>
                    `;
                    listContainer.appendChild(item);
                });
            });

            updateProgressBar();
            loadVideo(0);
        }

        function exitPlayer() {
            window.history.pushState({}, "", window.location.pathname); // Clear URL
            // Stop video
            document.getElementById('ytPlayer').src = "";
            document.getElementById('localPlayer').pause();
            
            renderCourseGrid();
        }

        function loadVideo(index) {
            if(flatList.length === 0) return;
            currentIndex = index;
            const vid = flatList[index];

            document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${index}`).classList.add('active');

            document.getElementById('currentVideoTitle').innerText = vid.title;
            document.getElementById('currentVideoDesc').innerText = vid.desc || "";

            const yt = document.getElementById('ytPlayer');
            const loc = document.getElementById('localPlayer');
            
            yt.src = ""; loc.pause();

            if (vid.type === 'youtube') {
                loc.style.display = 'none';
                yt.style.display = 'block';
                let src = vid.src;
                
                if(src.includes("watch?v=")) src = src.replace("watch?v=", "embed/");
                if(src.includes("youtu.be/")) src = src.replace("youtu.be/", "www.youtube.com/embed/");
                
                if (!src.includes('?')) {
                    src += "?rel=0&modestbranding=1";
                } else {
                    src += "&rel=0&modestbranding=1";
                }

                yt.src = src;
            } else {
                yt.style.display = 'none';
                loc.style.display = 'block';
                document.getElementById('localSource').src = vid.src;
                loc.load();
            }
        }

        function markAndNext() {
            if(flatList.length === 0) return;
            const vid = flatList[currentIndex];
            userProgress[vid.id] = true;
            localStorage.setItem('asu_vid_progress_' + currentCourseId, JSON.stringify(userProgress));

            const item = document.getElementById(`item-${currentIndex}`);
            item.classList.add('completed');
            item.querySelector('.item-icon').innerText = '✓';
            updateProgressBar();

            if (currentIndex < flatList.length - 1) {
                loadVideo(currentIndex + 1);
            }
        }

        function prevVideo() {
            if (currentIndex > 0) loadVideo(currentIndex - 1);
        }

        function updateProgressBar() {
            if(flatList.length === 0) return;
            const total = flatList.length;
            const done = Object.keys(userProgress).length;
            const pct = Math.round((done / total) * 100);
            document.getElementById('progressBar').style.width = pct + "%";
            document.getElementById('progressText').innerText = pct + "%";
        }

        init();
    </script>
</body>
</html>
