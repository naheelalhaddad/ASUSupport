            justify-content: flex-end;
        }

        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;

        let currentCourseId = null;
        let flatList = [];
        let currentIndex = 0;
        let userProgress = {};

        function init() {
            const dropdown = document.getElementById('courseDropdown');
            for (const [key, data] of Object.entries(coursesData)) {
                const option = document.createElement('option');
                option.value = key;
                option.innerText = data.title;
                dropdown.appendChild(option);
            }

            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');

            if(courseId && coursesData[courseId]) {
                openPlayer(courseId);
                dropdown.value = courseId;
            } else {
                renderCourseGrid();
            }
        }

        function switchCourse(id) {
            window.history.pushState({}, "", `?id=${id}`);
            openPlayer(id);
        }

        function renderCourseGrid() {
            document.getElementById('courseSelectionView').style.display = 'block';
            document.getElementById('playerView').style.display = 'none';
            document.getElementById('courseDropdown').style.display = 'none';
            document.getElementById('backToCoursesBtn').style.display = 'none';

            const grid = document.getElementById('courseGrid');
            grid.innerHTML = "";

            for (const [key, data] of Object.entries(coursesData)) {
                const card = document.createElement('div');
                card.className = 'video-course-card';
                card.onclick = () => {
                    window.history.pushState({}, "", `?id=${key}`);
                    openPlayer(key);
                };
                
                card.innerHTML = `
                    <div class="v-card-title">${data.title}</div>
                    <div class="v-card-desc">${data.desc}</div>
                `;
                grid.appendChild(card);
            }
        }
        
        function filterCourses() {
            const query = document.getElementById('courseSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.video-course-card');
            
            cards.forEach(card => {
                const title = card.querySelector('.v-card-title').innerText.toLowerCase();
                const desc = card.querySelector('.v-card-desc').innerText.toLowerCase();
                if(title.includes(query) || desc.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function openPlayer(id) {
            currentCourseId = id;
            const course = coursesData[id];
            
            if (!course.modules || course.modules.length === 0) {
                alert("Coming Soon! No videos uploaded for this course yet.");
                window.history.pushState({}, "", window.location.pathname);
                renderCourseGrid();
                return;
            }

            document.getElementById('courseSelectionView').style.display = 'none';
            document.getElementById('playerView').style.display = 'flex';
            document.getElementById('courseDropdown').style.display = 'block';
            document.getElementById('courseDropdown').value = id;
            document.getElementById('backToCoursesBtn').style.display = 'flex';

            userProgress = JSON.parse(localStorage.getItem('asu_vid_progress_' + id)) || {};

            const listContainer = document.getElementById('moduleList');
            listContainer.innerHTML = "";
            flatList = [];

            course.modules.forEach(mod => {
                const header = document.createElement('div');
                header.className = 'module-header';
                header.innerText = mod.title;
                listContainer.appendChild(header);

                mod.videos.forEach(vid => {
                    flatList.push(vid);
                    const idx = flatList.length - 1;
                    
                    const item = document.createElement('div');
                    item.className = 'video-item';
                    item.id = `item-${idx}`;
                    if(userProgress[vid.id]) item.classList.add('completed');
                    item.onclick = () => loadVideo(idx);

                    item.innerHTML = `
                        <div class="item-title">${vid.title}</div>
                        <div class="item-icon">${userProgress[vid.id] ? '✓' : '▶'}</div>
                    `;
                    listContainer.appendChild(item);
                });
            });

            updateProgressBar();
            loadVideo(0);
        }

        function exitPlayer() {
            window.history.pushState({}, "", window.location.pathname);
            document.getElementById('ytPlayer').src = "";
            document.getElementById('localPlayer').pause();
            renderCourseGrid();
        }

        function loadVideo(index) {
            if(flatList.length === 0) return;
            currentIndex = index;
            const vid = flatList[index];

            document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${index}`).classList.add('active');

            document.getElementById('currentVideoTitle').innerText = vid.title;
            document.getElementById('currentVideoDesc').innerText = vid.desc || "";

            const yt = document.getElementById('ytPlayer');
            const local = document.getElementById('localPlayer');
            
            yt.src = ""; local.pause();

            if (vid.type === 'youtube') {
                local.style.display = 'none';
                yt.style.display = 'block';
                let src = vid.src;
                
                if(src.includes("watch?v=")) src = src.replace("watch?v=", "embed/");
                if(src.includes("youtu.be/")) src = src.replace("youtu.be/", "www.youtube.com/embed/");
                
                if (!src.includes('?')) {
                    src += "?rel=0&modestbranding=1";
                } else {
                    src += "&rel=0&modestbranding=1";
                }

                yt.src = src;
            } else {
                yt.style.display = 'none';
                local.style.display = 'block';
                document.getElementById('localSource').src = vid.src;
                local.load();
            }
        }

        function markAndNext() {
            if(flatList.length === 0) return;
            const vid = flatList[currentIndex];
            userProgress[vid.id] = true;
            localStorage.setItem('asu_vid_progress_' + currentCourseId, JSON.stringify(userProgress));

            const item = document.getElementById(`item-${currentIndex}`);
            item.classList.add('completed');
            item.querySelector('.item-icon').innerText = '✓';
            updateProgressBar();

            if (currentIndex < flatList.length - 1) {
                loadVideo(currentIndex + 1);
            }
        }

        function prevVideo() {
            if (currentIndex > 0) loadVideo(currentIndex - 1);
        }

        function updateProgressBar() {
            if(flatList.length === 0) return;
            const total = flatList.length;
            const done = Object.keys(userProgress).length;
            const pct = Math.round((done / total) * 100);
            document.getElementById('progressBar').style.width = pct + "%";
            document.getElementById('progressText').innerText = pct + "%";
        }

        init();
    </script>
</body>
</html>
