    <title>ASU Bank - المواد الدراسية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* --- VISUAL STYLE --- */
        body { 
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #2b0000, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { margin-bottom: 20px; text-shadow: 0 0 10px #9D0208; }

        /* --- SEARCH BOX --- */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            border-radius: 50px;
            border: 2px solid #9D0208;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .search-box:focus { box-shadow: 0 0 25px rgba(157, 2, 8, 0.5); }

        /* --- ACCORDION STYLES --- */
        .accordion-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .accordion-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            padding: 20px;
            width: 100%;
            border: 1px solid #444;
            text-align: right; /* RTL Alignment */
            font-size: 1.3rem;
            font-weight: bold;
            transition: 0.4s;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Hover & Active States */
        .accordion-btn:hover, .accordion-btn.active {
            background: rgba(157, 2, 8, 0.2);
            border-color: #9D0208;
            box-shadow: 0 0 15px rgba(157, 2, 8, 0.3);
        }

        /* The "Major" Icon/Emoji */
        .major-icon { margin-left: 15px; font-size: 1.5rem; }
        
        /* The Arrow Indicator */
        .arrow { transition: 0.3s; font-size: 1.2rem; }
        .accordion-btn.active .arrow { transform: rotate(-180deg); }

        /* The Hidden Panel */
        .panel {
            padding: 0 15px;
            background: rgba(0, 0, 0, 0.2);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            border-radius: 0 0 15px 15px;
            margin-top: -10px; /* Connects nicely to button */
            margin-bottom: 5px;
            border-left: 1px solid transparent;
            border-right: 1px solid transparent;
            border-bottom: 1px solid transparent;
        }

        .panel.open {
            border-color: #9D0208; /* Show border when open */
            padding: 20px 15px;
        }

        /* --- COURSE GRID INSIDE PANEL --- */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            padding-top: 10px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 110px;
        }

        .course-card:hover {
            transform: translateY(-3px);
            background: rgba(157, 2, 8, 0.15);
            border-color: #9D0208;
        }

        .course-name { font-weight: bold; font-size: 1.05rem; margin-bottom: 4px; line-height: 1.3; color: #fff; direction: ltr; }
        .course-arabic { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; direction: rtl; }

        /* --- MODAL --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: #151515;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #9D0208;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 40px rgba(157, 2, 8, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px; 
            background: none; border: none;
            color: #888; font-size: 1.5rem; cursor: pointer;
        }
        .close-modal:hover { color: white; }

        .modal-title { color: #9D0208; font-size: 1.4rem; margin-bottom: 5px; font-weight: bold; direction: ltr; }
        .modal-subtitle { color: #ccc; font-size: 1rem; margin-bottom: 25px; direction: rtl; }

        .resource-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 15px 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.2s;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .resource-btn:hover {
            background: #9D0208;
            border-color: #9D0208;
            transform: translateY(-2px);
        }
        
        .resource-icon { font-size: 1.3rem; opacity: 0.9; }

    </style>
</head>

        // ==========================================
        // 2. GENERATE THE UI
        // ==========================================
        const wrapper = document.getElementById('accordionWrapper');

        function init() {
            majors.forEach(major => {
                // 1. Create the Button (Header)
                const btn = document.createElement('button');
                btn.className = 'accordion-btn';
                btn.innerHTML = `
                    <span>
                        <span class="major-icon">${major.icon}</span> 
                        ${major.title}
                    </span>
                    <span class="arrow">▼</span>
                `;
                
                // 2. Create the Panel (Hidden Content)
                const panel = document.createElement('div');
                panel.className = 'panel';
                
                // 3. Create the Grid inside the Panel
                const grid = document.createElement('div');
                grid.className = 'courses-grid';
                
                // 4. Fill the Grid with Matching Courses
                const majorCourses = courses.filter(c => c.tags.includes(major.id));
                majorCourses.forEach(course => {
                    const card = createCourseCard(course);
                    grid.appendChild(card);
                });

                // Assemble them
                panel.appendChild(grid);
                wrapper.appendChild(btn);
                wrapper.appendChild(panel);

                // Add Click Event
                btn.addEventListener("click", function() {
                    this.classList.toggle("active");
                    const p = this.nextElementSibling;
                    const gridHeight = p.scrollHeight + 50; // Buffer for padding
                    
                    if (p.style.maxHeight) {
                        p.style.maxHeight = null;
                        p.classList.remove("open");
                    } else {
                        p.style.maxHeight = gridHeight + "px";
                        p.classList.add("open");
                    }
                });
            });
        }

        function createCourseCard(course) {
            const card = document.createElement('div');
            card.className = 'course-card';
            card.dataset.name = (course.name + " " + course.arabic).toLowerCase(); // For searching
            card.onclick = () => openModal(course);

            card.innerHTML = `
                <div class="course-name">${course.name}</div>
                <div class="course-arabic">${course.arabic}</div>
            `;
            return card;
        }

        // ==========================================
        // 3. SEARCH LOGIC
        // ==========================================
        const searchInput = document.getElementById('searchInput');
        
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const cards = document.querySelectorAll('.course-card');
            
            cards.forEach(card => {
                const name = card.dataset.name;
                // If it matches search, show it. If not, hide it.
                if(name.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });

            // Optional: If searching, expand all accordions to show results
            const panels = document.querySelectorAll('.panel');
            if(query.length > 0) {
                panels.forEach(p => {
                    p.style.maxHeight = p.scrollHeight + "px";
                    p.classList.add("open");
                    p.previousElementSibling.classList.add("active");
                });
            } else {
                // If search cleared, collapse all
                panels.forEach(p => {
                    p.style.maxHeight = null;
                    p.classList.remove("open");
                    p.previousElementSibling.classList.remove("active");
                });
            }
        });

        // ==========================================
        // 4. MODAL LOGIC
        // ==========================================
        const modal = document.getElementById('resourceModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalSubtitle = document.getElementById('modalSubtitle');
        const btnDrive = document.getElementById('btnDrive');
        
        function openModal(course) {
            modalTitle.innerText = course.name;
            modalSubtitle.innerText = course.arabic;
            
            btnDrive.href = course.drive; 
            document.getElementById('btnSlides').href = course.drive;
            document.getElementById('btnPastPapers').href = course.drive;
            document.getElementById('btnMidterms').href = course.drive;
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        window.onclick = function(e) {
            if (e.target == modal) closeModal();
        }

        // Run the system
        init();

    </script>

</body>
