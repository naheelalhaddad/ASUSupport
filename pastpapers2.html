<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FNTBG5RY0T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FNTBG5RY0T');

    <title>ASU Bank - المواد الدراسية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* --- VISUAL STYLE --- */
        body { 
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #2b0000, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { margin-bottom: 20px; text-shadow: 0 0 10px #9D0208; }

        /* --- SEARCH BOX --- */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            border-radius: 50px;
            border: 2px solid #9D0208;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .search-box:focus { box-shadow: 0 0 25px rgba(157, 2, 8, 0.5); }

        /* --- ACCORDION STYLES --- */
        .accordion-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .accordion-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            padding: 20px;
            width: 100%;
            border: 1px solid #444;
            text-align: right;
            font-size: 1.3rem;
            font-weight: bold;
            transition: 0.4s;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .accordion-btn:hover, .accordion-btn.active {
            background: rgba(157, 2, 8, 0.2);
            border-color: #9D0208;
            box-shadow: 0 0 15px rgba(157, 2, 8, 0.3);
        }

        .major-icon { margin-left: 15px; font-size: 1.5rem; }
        .arrow { transition: 0.3s; font-size: 1.2rem; }
        .accordion-btn.active .arrow { transform: rotate(-180deg); }

        .panel {
            padding: 0 15px;
            background: rgba(0, 0, 0, 0.2);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            border-radius: 0 0 15px 15px;
            margin-top: -10px;
            margin-bottom: 5px;
            border-left: 1px solid transparent;
            border-right: 1px solid transparent;
            border-bottom: 1px solid transparent;
        }

        .panel.open {
            border-color: #9D0208;
            padding: 20px 15px;
        }

        /* --- COURSE CARD STYLES --- */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            padding-top: 10px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex; 
            flex-direction: column;
            justify-content: space-between; 
            align-items: center;
            min-height: 120px;
        }

        .course-card:hover {
            transform: translateY(-3px);
            background: rgba(157, 2, 8, 0.15);
            border-color: #9D0208;
        }

        .course-info { width: 100%; }
        .course-name { font-weight: bold; font-size: 1.05rem; margin-bottom: 4px; line-height: 1.3; color: #fff; direction: ltr; }
        .course-arabic { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; direction: rtl; }

        .card-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
            width: 100%;
        }

        .info-tag {
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
        }

        /* --- COURSE MENU MODAL --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: #151515;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #9D0208;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 40px rgba(157, 2, 8, 0.3);
            animation: slideUp 0.3s ease;
        }

        /* --- NEW: PDF VIEWER MODAL --- */
        #pdfViewerModal {
            z-index: 3000; /* Higher than normal modal */
        }
        
        #pdfViewerContent {
            width: 95%;
            height: 90%;
            max-width: 1000px;
            padding: 0;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        #pdfFrame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .pdf-header {
            padding: 10px;
            background: #9D0208;
            color: white;
            text-align: right;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-close-pdf {
            background: white;
            color: #9D0208;
            border: none;
            padding: 5px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px; 
            background: none; border: none;
            color: #888; font-size: 1.5rem; cursor: pointer;
        }
        .close-modal:hover { color: white; }

        .modal-title { color: #9D0208; font-size: 1.4rem; margin-bottom: 5px; font-weight: bold; direction: ltr; }
        .modal-subtitle { color: #ccc; font-size: 1rem; margin-bottom: 25px; direction: rtl; }

        .resource-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 15px 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.2s;
            font-size: 1rem;
            box-sizing: border-box;
            cursor: pointer;
        }

        .resource-btn:hover {
            background: #9D0208;
            border-color: #9D0208;
            transform: translateY(-2px);
        }
        
        .resource-icon { font-size: 1.3rem; opacity: 0.9; }

    </style>
</head>
<body>

    <h1>بنك الأسئلة والمواد</h1>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن اسم المادة... (Search Course)">
    </div>

    <div id="accordionWrapper" class="accordion-container"></div>

    <div id="resourceModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">✕</button>
            <h2 id="modalTitle" class="modal-title">Course Name</h2>
            <div id="modalSubtitle" class="modal-subtitle">Arabic Name</div>
            
            <button id="btnSlides" class="resource-btn" onclick="openPdf('slides')">
                <span>ملفات الشرح (Slides)</span> <span class="resource-icon">📄</span>
            </button>
            
            <button id="btnPastPapers" class="resource-btn" onclick="openPdf('papers')">
                <span>أسئلة سنوات (Past Papers)</span> <span class="resource-icon">📝</span>
            </button>
            
            <button id="btnMidterms" class="resource-btn" onclick="openPdf('midterms')">
                <span>امتحانات نصفية (Midterms)</span> <span class="resource-icon">🎓</span>
            </button>
            
            <button id="btnSummaries" class="resource-btn" style="border-color: #9D0208; font-weight: bold;" onclick="openPdf('summaries')">
                <span>الملخصات (Summaries)</span> <span class="resource-icon">📚</span>
            </button>
        </div>
    </div>

    <div id="pdfViewerModal" class="modal-overlay">
        <div id="pdfViewerContent" class="modal-content">
            <div class="pdf-header">
                <span id="pdfHeaderTitle">Viewing PDF</span>
                <button class="btn-close-pdf" onclick="closePdfViewer()">إغلاق (Close)</button>
            </div>
            <iframe id="pdfFrame" src=""></iframe>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: DATA
        // ==========================================
        const majors = [
            { id: "cs", title: "علم الحاسوب (CS)", icon: "💻" },
            { id: "se", title: "هندسة البرمجيات (SE)", icon: "⚙️" },
            { id: "cyber", title: "الأمن السيبراني (Cyber)", icon: "🔒" },
            { id: "ai", title: "الذكاء الاصطناعي (AI)", icon: "🤖" },
            { id: "gaming", title: "الواقع الرقمي والألعاب (Gaming)", icon: "🎮" }
        ];

        /* HOW TO ADD FILES:
           1. Upload your PDF to a folder named 'files' in your GitHub.
           2. Change 'file: "#"' to 'file: "files/calculus1.pdf"' 
        */
        const courses = [
            // --- Shared / First Year / General ---
            { name: "Structured Programming (C++)", arabic: "البرمجة المهيكلة", tags: ["cs", "se", "cyber", "ai", "gaming"], file: "#" },
            { name: "Object-Oriented Programming (1)", arabic: "البرمجة الكينونية (1)", tags: ["cs", "se", "cyber", "ai", "gaming"], file: "#" },
            // ... (Your full list remains here, I shortened it for brevity but use your full list) ...
             { name: "Calculus (1)", arabic: "تفاضل وتكامل (1)", tags: ["cs", "se", "cyber", "ai", "gaming"], file: "#" },
             { name: "Linear Algebra", arabic: "الجبر الخطي", tags: ["cs", "se", "cyber", "ai", "gaming"], file: "#" }
        ];

        // ==========================================
        // UI GENERATION
        // ==========================================
        const wrapper = document.getElementById('accordionWrapper');

        function init() {
            majors.forEach(major => {
                const btn = document.createElement('button');
                btn.className = 'accordion-btn';
                btn.innerHTML = `<span><span class="major-icon">${major.icon}</span> ${major.title}</span><span class="arrow">▼</span>`;
                
                const panel = document.createElement('div');
                panel.className = 'panel';
                
                const grid = document.createElement('div');
                grid.className = 'courses-grid';
                
                const majorCourses = courses.filter(c => c.tags.includes(major.id));
                majorCourses.forEach(course => {
                    grid.appendChild(createCourseCard(course));
                });

                panel.appendChild(grid);
                wrapper.appendChild(btn);
                wrapper.appendChild(panel);

                btn.addEventListener("click", function() {
                    this.classList.toggle("active");
                    const p = this.nextElementSibling;
                    if (p.style.maxHeight) {
                        p.style.maxHeight = null;
                        p.classList.remove("open");
                    } else {
                        p.style.maxHeight = (p.scrollHeight + 50) + "px";
                        p.classList.add("open");
                    }
                });
            });
        }

        function createCourseCard(course) {
            const card = document.createElement('div');
            card.className = 'course-card';
            card.dataset.name = (course.name + " " + course.arabic).toLowerCase();
            card.onclick = () => openMenuModal(course);

            let tagsHtml = `<div class="card-tags">` + 
                           course.tags.map(t => `<span class="info-tag">${t}</span>`).join('') + 
                           `</div>`;

            card.innerHTML = `
                <div class="course-info">
                    <div class="course-name">${course.name}</div>
                    <div class="course-arabic">${course.arabic}</div>
                </div>
                ${tagsHtml}
            `;
            return card;
        }

        // ==========================================
        // SEARCH LOGIC
        // ==========================================
        document.getElementById('searchInput').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const cards = document.querySelectorAll('.course-card');
            const panels = document.querySelectorAll('.panel');

            cards.forEach(card => {
                card.style.display = card.dataset.name.includes(query) ? 'flex' : 'none';
            });

            if(query.length > 0) {
                panels.forEach(p => {
                    if(p.querySelectorAll('.course-card[style="display: flex;"]').length > 0) {
                        p.style.maxHeight = p.scrollHeight + "px";
                        p.classList.add("open");
                        p.previousElementSibling.classList.add("active");
                    } else {
                        p.style.maxHeight = null;
                        p.classList.remove("open");
                        p.previousElementSibling.classList.remove("active");
                    }
                });
            } else {
                panels.forEach(p => {
                    p.style.maxHeight = null;
                    p.classList.remove("open");
                    p.previousElementSibling.classList.remove("active");
                });
            }
        });

        // ==========================================
        // MODAL & PDF LOGIC
        // ==========================================
        const menuModal = document.getElementById('resourceModal');
        const pdfModal = document.getElementById('pdfViewerModal');
        const pdfFrame = document.getElementById('pdfFrame');
        
        let currentCourseFile = ""; // Stores the PDF link for the selected course

        function openMenuModal(course) {
            document.getElementById('modalTitle').innerText = course.name;
            document.getElementById('modalSubtitle').innerText = course.arabic;
            currentCourseFile = course.file; // Load the file path from data
            menuModal.style.display = 'flex';
        }

        function closeModal() {
            menuModal.style.display = 'none';
        }

        // Opens the PDF Viewer
        function openPdf(type) {
            // Check if a file link exists
            if (!currentCourseFile || currentCourseFile === "#") {
                alert("عذراً، الملف غير متوفر حالياً.\nSorry, file not available yet.");
                return;
            }
            
            // In a real scenario, you might have different files for slides vs papers.
            // For now, this opens the main file associated with the course.
            document.getElementById('pdfHeaderTitle').innerText = "Viewing: " + type.toUpperCase();
            pdfFrame.src = currentCourseFile;
            
            // Hide menu, Show PDF
            menuModal.style.display = 'none';
            pdfModal.style.display = 'flex';
        }

        function closePdfViewer() {
            pdfModal.style.display = 'none';
            pdfFrame.src = ""; // Stop loading
            menuModal.style.display = 'flex'; // Go back to menu
        }

        window.onclick = function(e) {
            if (e.target == menuModal) closeModal();
            if (e.target == pdfModal) closePdfViewer();
        }

        init();
    </script>

</body>
</html>
