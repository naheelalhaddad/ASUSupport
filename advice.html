<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>نصائح وإرشادات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ANIMATED GRADIENT BACKGROUND */
        body { 
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #2b0000, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 40px 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 50px;
            color: white;
            text-shadow: 0 0 15px #9D0208;
        }

        /* GRID CONTAINER */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ADVICE CARDS */
        .guide-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .guide-card:hover {
            transform: translateY(-5px);
            border-color: #9D0208;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 5px 20px rgba(157, 2, 8, 0.2);
        }

        .icon { font-size: 3rem; margin-bottom: 15px; display: block; }

        h3 { color: #fff; margin: 10px 0; font-size: 1.2rem; }
        p { color: #aaa; font-size: 0.9rem; line-height: 1.5; }

        .back-link {
            display: inline-block;
            margin-top: 60px;
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }
        .back-link:hover { color: #fff; border-color: #fff; }

    </style>
</head>
<body>

    <h1>نصائح وإرشادات عامة (Helpful Guides)</h1>

    <div class="grid-container">
        
        <a href="tour.html" class="guide-card" style="border-color: #9D0208; background: rgba(157, 2, 8, 0.1);">
            <span class="icon">🏛️</span>
            <h3>جولة في الجامعة (MyASU Tour)</h3>
            <p>استكشف القاعات والمختبرات والمرافق عبر جولة افتراضية.</p>
        </a>

    </div>

    <a href="index.html" class="back-link">← العودة للصفحة الرئيسية</a>

</body>
</html>
