    <style>
        body { 
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #2b0000, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { font-size: 2.2rem; margin-bottom: 40px; text-shadow: 0 0 15px #9D0208; }

        .search-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            margin-bottom: 50px;
        }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #9D0208;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(157, 2, 8, 0.2);
        }

        input:focus {
            box-shadow: 0 0 25px rgba(157, 2, 8, 0.6);
            background: rgba(0,0,0,0.8);
        }

        #resultCard {
            display: none; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid #9D0208;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .prof-name { font-size: 1.8rem; color: #9D0208; margin-bottom: 10px; font-weight: bold; }
        .prof-office { font-size: 1.4rem; margin-bottom: 5px; }
        .prof-location { color: #ccc; font-size: 1rem; }

        .not-found {

            font-size: 1.2rem;
            margin-top: 20px;
            display: none;
        }

        .nav-links {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
        }

        .back-link {
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }
        .back-link:hover { color: #fff; border-color: #fff; }
        
        .home-link {

            font-weight: bold;
            text-decoration: none;
            border: 1px solid #9D0208;
            padding: 10px 20px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .home-link:hover { background: #9D0208; color: white; }

    </style>
</head>
