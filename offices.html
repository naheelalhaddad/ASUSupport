    <style>
        body { 
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #2b0000, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { font-size: 2.2rem; margin-bottom: 40px; text-shadow: 0 0 15px #9D0208; }

        .search-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            margin-bottom: 50px;
        }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #9D0208;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(157, 2, 8, 0.2);
        }

        input:focus {
            box-shadow: 0 0 25px rgba(157, 2, 8, 0.6);
            background: rgba(0,0,0,0.8);
        }

        #resultCard {
            display: none; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid #9D0208;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .prof-name { font-size: 1.8rem; color: #9D0208; margin-bottom: 10px; font-weight: bold; }
        .prof-office { font-size: 1.4rem; margin-bottom: 5px; }
        .prof-location { color: #ccc; font-size: 1rem; margin-bottom: 20px; }

        .hours-btn {
            background: #9D0208;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
        }
        .hours-btn:hover { background: #ba0209; transform: scale(1.05); }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #9D0208;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px rgba(157, 2, 8, 0.5);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px; left: 15px;
            background: none; border: none;
            color: #888; font-size: 1.5rem; cursor: pointer;
        }
        .close-btn:hover { color: white; }

        .hours-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        .hours-table th, .hours-table td {
            padding: 12px;
            border-bottom: 1px solid #444;
            text-align: right;
            font-size: 0.95rem;
        }
        .hours-table th { color: #9D0208; width: 35%; }
        .hours-table td { color: #ddd; direction: ltr; text-align: right; }

        .not-found { color: #ff6b6b; font-size: 1.2rem; margin-top: 20px; display: none; }
        .nav-links { margin-top: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .back-link { color: #888; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        .back-link:hover { color: #fff; border-color: #fff; }
        .home-link { color: #9D0208; font-weight: bold; text-decoration: none; border: 1px solid #9D0208; padding: 10px 20px; border-radius: 20px; transition: 0.3s; }
        .home-link:hover { background: #9D0208; color: white; }
    </style>
</head>

        const input = document.getElementById('searchInput');
        const card = document.getElementById('resultCard');
        const errorMsg = document.getElementById('notFoundMsg');
        const modal = document.getElementById('hoursModal');

        const pName = document.getElementById('pName');
        const pOffice = document.getElementById('pOffice');
        const pLoc = document.getElementById('pLoc');

        const mName = document.getElementById('modalProfName');
        const hSun = document.getElementById('hSun');
        const hMon = document.getElementById('hMon');
        const hTue = document.getElementById('hTue');
        const hWed = document.getElementById('hWed');
        const hThu = document.getElementById('hThu');

        let currentProf = null;

        input.addEventListener('input', function() {
            const query = input.value.toLowerCase().trim();

            if (query === "") {
                card.style.display = "none";
                errorMsg.style.display = "none";
                return;
            }

            const result = professors.find(prof => prof.name.toLowerCase().includes(query));

            if (result) {
                currentProf = result;
                card.style.display = "block";
                errorMsg.style.display = "none";
                
                pName.textContent = result.name;
                pOffice.textContent = "مكتب رقم: " + result.office;
                pLoc.textContent = result.location;
            } else {
                currentProf = null;
                card.style.display = "none";
                errorMsg.style.display = "block";
            }
        });

        function openModal() {
            if (!currentProf) return;
            mName.textContent = currentProf.name;

            if (currentProf.hours) {
                hSun.textContent = currentProf.hours.sun || "-";
                hMon.textContent = currentProf.hours.mon || "-";
                hTue.textContent = currentProf.hours.tue || "-";
                hWed.textContent = currentProf.hours.wed || "-";
                hThu.textContent = currentProf.hours.thu || "-";
            } else {
                hSun.textContent = "غير متوفر";
                hMon.textContent = "غير متوفر";
                hTue.textContent = "غير متوفر";
                hWed.textContent = "غير متوفر";
                hThu.textContent = "غير متوفر";
            }
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
