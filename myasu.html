<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>تطبيق MyASU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #2b0000, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 40px 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 50px;
            color: white;
            text-shadow: 0 0 15px #9D0208;
        }

        /* FLEX CONTAINER */
        .split-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* SECTION BOXES */
        .section-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            flex: 1 1 300px; 
            max-width: 400px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .section-box:hover {
            border-color: #9D0208;
            transform: translateY(-5px);
        }

        h2 { color: #9D0208; margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #444; padding-bottom: 15px; width: 100%; }

        /* STORE IMAGES STYLE */
        .store-img {
            display: block;
            width: 100%;
            max-width: 180px; 
            height: auto;
            margin: 8px 0;
            border-radius: 5px;
            transition: 0.2s;
        }
        
        .store-img:hover { transform: scale(1.05); filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }

        /* BUTTONS */
        .video-btn {
            display: inline-block;
            margin-top: 15px;
            background: rgba(157, 2, 8, 0.2);
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid #9D0208;
            padding: 8px 20px;
            border-radius: 30px;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .video-btn:hover { background: #9D0208; box-shadow: 0 0 15px #9D0208; }

        .web-btn {
            display: block;
            background: linear-gradient(90deg, #9D0208 0%, #5e0105 100%);
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            margin-top: 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(157, 2, 8, 0.4);
            transition: 0.3s;
        }
        .web-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(157, 2, 8, 0.6); }

        .back-link {
            display: inline-block;
            margin-top: 60px;
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }
        .back-link:hover { color: #fff; border-color: #fff; }

    </style>
</head>
<body>

    <h1>بوابة الجامعة والتطبيق (MyASU Portal)</h1>

    <div class="split-container">
        
        <div class="section-box">
            <h2>📱 تطبيق الهاتف (Mobile App)</h2>
            <p style="color: #ccc; margin-bottom: 10px;">
                حمل التطبيق الرسمي لمتابعة الجدول، العلامات، والغياب.
            </p>

            <a href="https://drive.google.com/drive/folders/13AtCBkkqbdaAbhxQ9QYUGQB8i4GQiYZF?usp=sharing" class="video-btn" target="_blank">
                🎥 شرح التطبيق (Watch Tutorial)
            </a>

            <a href="https://play.google.com/store/apps/details?id=com.kivocsa99.asu" target="_blank">
                <img src="Google Play.jfif" alt="Get it on Google Play" class="store-img">
            </a>

            <a href="https://apps.apple.com/app/id6745174615" target="_blank">
                <img src="App store.jfif" alt="Download on the App Store" class="store-img">
            </a>

            <a href="https://apkpure.com/my-asu-app/com.kivocsa99.asu" target="_blank">
                <img src="APK.png" alt="Download APK" class="store-img">
            </a>
        </div>

        <div class="section-box">
            <h2>💻 بوابة الطالب (Web Portal)</h2>
            <p style="color: #ccc; margin-bottom: 30px;">
                الدخول إلى نظام التسجيل والخدمات الإلكترونية عبر المتصفح.
            </p>
            
            <div style="font-size: 4rem; margin: 10px 0;">🌐</div>

            <a href="https://student.asu.edu.jo" class="web-btn" target="_blank">
                الدخول للبوابة (Go to Portal) ➜
            </a>
        </div>

    </div>

    <a href="advice.html" class="back-link">← العودة لصفحة النصائح</a>

</body>
</html>
